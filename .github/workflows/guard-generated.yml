name: Guard Generated Files

on:
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bloquear alterações em arquivos gerados
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          if git diff --name-only FETCH_HEAD...HEAD | grep -qx "index.html"; then
            echo "index.html é gerado pelo GitHub Action. Remova esse arquivo do PR (deixe só scripts/template/config)."
            exit 1
          fi
